version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 7
      default-days: 7
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types: [minor, patch]
      npm-security:
        applies-to: security-updates
        patterns: ['*']
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      actions-minor-patch:
        applies-to: version-updates
        update-types: [minor, patch]
      actions-security:
        applies-to: security-updates
        patterns: ['*']
