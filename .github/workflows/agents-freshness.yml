name: Constitution freshness

# Fails when AGENTS.md has not been reviewed within the cadence, keeping the
# instruction file from rotting silently.
on:
  schedule:
    - cron: '0 9 * * 1'
  pull_request:
    paths:
      - 'AGENTS.md'
  workflow_dispatch:

jobs:
  check-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Assert AGENTS.md reviewed within 45 days
        run: ./scripts/check-agents-freshness.sh AGENTS.md 45
